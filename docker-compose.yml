# ── Shared environment block ────────────────────────────────────────────────
# All services inherit AWS credentials and table names from the .env file.
x-aws-env: &aws-env
  AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
  AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
  AWS_REGION: ${AWS_REGION}
  SQS_QUEUE_URL: ${SQS_QUEUE_URL}
  EARTHQUAKES_TABLE: ${EARTHQUAKES_TABLE}
  ALERTS_TABLE: ${ALERTS_TABLE}
  CITIES_TABLE: ${CITIES_TABLE}

services:

  # ── 1. Seismic Ingester ──────────────────────────────────────────────────
  # Polls USGS GeoJSON feed every 60 s, deduplicates, and publishes to SQS.
  ingester:
    build: ./ingester
    container_name: quakewatch-ingester
    restart: unless-stopped
    env_file: .env
    environment:
      <<: *aws-env
      USGS_FEED_URL: ${USGS_FEED_URL}
      POLL_INTERVAL_SECONDS: ${POLL_INTERVAL_SECONDS}

  # ── 2. REST API ──────────────────────────────────────────────────────────
  # FastAPI server — exposes /earthquakes, /alerts, /stats endpoints.
  api:
    build: ./api
    container_name: quakewatch-api
    restart: unless-stopped
    env_file: .env
    environment:
      <<: *aws-env
      API_PORT: 8000
    ports:
      - "${API_PORT:-8000}:8000"

  # ── 3. Impact Processor ──────────────────────────────────────────────────
  # Consumes SQS messages, calculates impact scores, writes to DynamoDB.
  processor:
    build: ./processor
    container_name: quakewatch-processor
    restart: unless-stopped
    env_file: .env
    environment:
      <<: *aws-env

  # ── 4. Alert Evaluator ───────────────────────────────────────────────────
  # Monitors the earthquakes table and writes alert records for high/medium events.
  alert-evaluator:
    build: ./alert-evaluator
    container_name: quakewatch-alert-evaluator
    restart: unless-stopped
    env_file: .env
    environment:
      <<: *aws-env
      HIGH_SEVERITY_MAG: ${HIGH_SEVERITY_MAG}
      HIGH_SEVERITY_IMPACT: ${HIGH_SEVERITY_IMPACT}
      MEDIUM_SEVERITY_MAG: ${MEDIUM_SEVERITY_MAG}
      MEDIUM_SEVERITY_IMPACT: ${MEDIUM_SEVERITY_IMPACT}

  # ── 5. Geo Dashboard ─────────────────────────────────────────────────────
  # Nginx serves the Leaflet frontend and proxies /api → FastAPI.
  dashboard:
    build: ./dashboard
    container_name: quakewatch-dashboard
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - api
